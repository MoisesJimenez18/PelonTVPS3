name: Resync completo de PelonTV (semanal)

on:
  schedule:
    - cron: "0 6 * * 0"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: node scripts/build-cache.js
        env:
          FULL_RESYNC: "true"

      - name: Comitear si hubo cambios
        run: |
          git config user.name "pelontv-bot"
          git config user.email "bot@pelontv.local"
          git add output/
          git diff --staged --quiet || git commit -m "Resync completo [skip ci]"
          git push
name: Actualizar cache de PelonTV

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: node scripts/build-cache.js

      - name: Comitear si hubo cambios
        run: |
          git config user.name "pelontv-bot"
          git config user.email "bot@pelontv.local"
          git add output/
          git diff --staged --quiet || git commit -m "Actualizar cache [skip ci]"
          git push
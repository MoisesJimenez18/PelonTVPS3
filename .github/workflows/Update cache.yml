name: Actualizar cache de PelonTV

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

concurrency:
  group: pelontv-cache-build
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci

      - run: node scripts/build-cache.js

      - name: Comitear si hubo cambios
        id: commit
        run: |
          git config user.name "pelontv-bot"
          git config user.email "bot@pelontv.local"
          git add output/
          if git diff --staged --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "Actualizar cache [skip ci]"

            success=false
            for i in 1 2 3 4 5; do
              git fetch origin main
              if git rebase origin/main && git push; then
                success=true
                break
              fi
              git rebase --abort 2>/dev/null || true
              echo "Push rechazado (intento $i/5), reintentando..."
              sleep $((RANDOM % 6 + 2))
            done

            if [ "$success" != "true" ]; then
              echo "No se pudo pushear después de varios intentos, abortando"
              exit 1
            fi

            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi